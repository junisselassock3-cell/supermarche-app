<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Supermarché - Gestion Produits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lien vers le JS externe -->
   
    
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-green-600 text-white p-4 shadow">
        <h1 class="text-2xl font-bold">🛒 Gestion Supermarché</h1>
    </header>

    <main class="p-6">
        <!-- Bouton Ajouter -->
        <div class="flex justify-end mb-4">
            <button id="addBtn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded shadow">
                + Ajouter un produit
            </button>
        </div>

        <!-- Tableau des produits -->
        <div class="overflow-x-auto bg-white rounded shadow">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-green-100">
                    <tr>
                        <th class="px-6 py-3 text-left">ID</th>
                        <th class="px-6 py-3 text-left">Nom</th>
                        <th class="px-6 py-3 text-left">Prix</th>
                        <th class="px-6 py-3 text-left">Stock</th>
                        <th class="px-6 py-3 text-left">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableProduits" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal Template -->
    <div id="modalContainer" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-lg shadow-lg w-96 p-6">
            <h2 id="modalTitle" class="text-xl font-bold mb-4">Ajouter un produit</h2>
            
            <div id="modalBody" class="space-y-3"></div>
            <div class="flex justify-end mt-4">
                <button id="cancelBtn" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded mr-2">Annuler</button>
                <button id="modalActionBtn" type="button" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">Valider</button>
            </div>
        </div>
    </div>
 <script defer src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
